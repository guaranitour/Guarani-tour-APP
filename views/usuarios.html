<div class="usuarios-view detalle-main">
  <div class="form-page-header">
    <h1>Usuarios</h1>
    <p class="page-desc">Administrá accesos del sistema</p>
  </div>

  <div class="detalle-section">
    <div class="section-title">Listado</div>
    <div id="users-list"></div>
  </div>

  <div class="detalle-section">
    <div class="section-title">Nuevo usuario</div>

    <div class="detail-grid">
      <div class="form-field full">
        <label class="form-label">Nombre</label>
        <input type="text" id="u-nombre" class="form-input" placeholder="Nombre completo">
      </div>

      <div class="form-field full">
        <label class="form-label">Correo</label>
        <input type="email" id="u-email" class="form-input">
      </div>

      <div class="form-field">
        <label class="form-label">Rol</label>
        <select id="u-role" class="form-input">
          <option value="viewer">Viewer</option>
          <option value="worker">Worker</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">Estado</label>
        <select id="u-status" class="form-input">
          <option value="enabled">Activo</option>
          <option value="disabled">Inactivo</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save" id="btn-crear-user">Agregar usuario</button>
    </div>
  </div>
</div>
