<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Guaraní Tour | Staff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="login-view">
    <div class="login-card">
      <div class="logo-wrap">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="10" width="28" height="16" rx="4" fill="rgba(255,255,255,.15)" stroke="rgba(201,168,76,.8)" stroke-width="1.5"/>
          <rect x="7" y="13" width="7" height="5" rx="1.5" fill="rgba(201,168,76,.55)"/>
          <rect x="16" y="13" width="7" height="5" rx="1.5" fill="rgba(201,168,76,.55)"/>
          <circle cx="10" cy="28" r="2.5" fill="rgba(255,255,255,.9)" stroke="rgba(201,168,76,.7)" stroke-width="1"/>
          <circle cx="26" cy="28" r="2.5" fill="rgba(255,255,255,.9)" stroke="rgba(201,168,76,.7)" stroke-width="1"/>
          <rect x="4" y="14" width="2" height="5" rx="1" fill="rgba(201,168,76,.9)"/>
          <rect x="30" y="14" width="2" height="5" rx="1" fill="rgba(201,168,76,.9)"/>
        </svg>
      </div>
      <h2>Guaraní Tour</h2>
      <p class="subtitle">Portal de staff</p>
      <div class="divider"><span>acceso restringido</span></div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.5-3.3-11.2-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C36.4 38.2 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        Iniciar sesión con Google
      </button>
      <p class="footer-note">Solo personal autorizado de <span>Guaraní Tour</span></p>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="app-view" class="hidden">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-brand">
        <div class="dot"></div>
        <span>Guaraní Tour</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-email" id="user-email"></span>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </header>

    <!-- Contenido principal -->
    <main class="main">
      <div class="page-header">
        <h1>Base de clientes</h1>
        <span class="passenger-count" id="passenger-count">—</span>
      </div>

      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar por nombre, CI, email…" oninput="filterPassengers()" />
      </div>

      <div id="passenger-list">
        <div class="list-state">
          <div class="icon">⏳</div>
          Cargando pasajeros…
        </div>
      </div>
    </main>
  </div>

  <!-- ── MODAL DETALLE ── -->
  <div id="detail-modal" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal-content">
      <div class="modal-header">
        <div class="modal-avatar" id="modal-avatar" onclick="triggerAvatarUpload()">
          <span id="modal-initials"></span>
          <div class="avatar-upload-hint">Cambiar<br>foto</div>
          <input type="file" id="avatar-file-input" accept="image/*" onchange="handleAvatarUpload(event)" />
        </div>
        <div class="modal-title">
          <h3 id="modal-name"></h3>
          <div class="modal-chips" id="modal-chips"></div>
        </div>
      </div>

      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-label">Documento de Identidad</span>
            <span class="detail-value" id="d-ci"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Fecha de nacimiento</span>
            <span class="detail-value" id="d-fecha"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Sexo</span>
            <span class="detail-value" id="d-sexo"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Vendedor</span>
            <span class="detail-value" id="d-vendedor"></span>
          </div>
          <div class="detail-field full">
            <span class="detail-label">E-mail</span>
            <span class="detail-value" id="d-email"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">ByC</span>
            <span class="detail-value" id="d-byc"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Club destino</span>
            <span class="detail-value" id="d-club"></span>
          </div>
        </div>
      </div>

      <div class="modal-close-wrap">
        <button class="btn-close-modal" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
